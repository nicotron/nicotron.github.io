<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow-x: hidden;
    }

    body {
      display: flex;
    }

    @media (max-width: 1023px) {
      html, body {
        height: auto;
        overflow-y: scroll;
      }
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      width: 100%;
      height: 100vh;
      gap: 0;
      grid-auto-rows: minmax(auto, 1fr);
    }

    .video-item {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .video-item video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    /* Hide all video controls */
    video::-webkit-media-controls {
      display: none;
    }

    video::-moz-media-controls {
      display: none;
    }

    /* Responsive */
    /* Tablet y Mobile: 1 columna apilada */
    @media (max-width: 1023px) {
      .videos-grid {
        grid-template-columns: 1fr;
        height: auto;
        grid-auto-rows: 100vh;
      }

      .video-item {
        width: 100%;
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <div class="videos-grid" id="grid"></div>

  <script>
    const videos = [
      'videos/ap1.mp4',
      'videos/ap2.mp4',
      'videos/ap3.mp4',
      'videos/ap4.mp4',
      'videos/ap5.mp4'
    ];

    const grid = document.getElementById('grid');

    videos.forEach((src, index) => {
      const div = document.createElement('div');
      div.className = 'video-item';

      const video = document.createElement('video');
      video.src = src;
      video.autoplay = true;
      video.muted = true;
      video.loop = true;
      video.controls = false;
      video.playsInline = true;

      div.appendChild(video);
      grid.appendChild(div);
    });
  </script>
</body>
</html>
